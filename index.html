<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Portofolio - Hamzz</title>
    <style>
        /* --- KURSOR NEON --- */
        * { cursor: none !important; }
        #cursor-custom {
            width: 20px; height: 20px;
            border: 2px solid #00b4d8;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.1s ease;
            box-shadow: 0 0 15px #00b4d8;
        }

        /* --- BACKGROUND ANIMASI --- */
        body {
            margin: 0; padding-top: 30px;
            font-family: 'Segoe UI', sans-serif;
            text-align: center; color: white;
            background: linear-gradient(-45deg, #0a192f, #020c1b, #0077b6, #001220);
            background-size: 400% 400%;
            animation: gradientAnim 15s ease infinite;
            background-attachment: fixed;
            overflow-x: hidden;
        }

        @keyframes gradientAnim {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- NAVIGASI --- */
        nav { margin-bottom: 30px; }
        .link-nav {
            text-decoration: none; font-weight: bold; color: #00b4d8;
            margin: 0 15px; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .link-nav:hover { color: white; text-shadow: 0 0 10px #00b4d8; }

        /* --- FOTO & HALAMAN --- */
        img {
            width: 220px; height: 220px; border-radius: 50%; 
            border: 4px solid #00b4d8; object-fit: cover; 
            transition: 0.4s; margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(0, 180, 216, 0.5);
        }
        img:hover { transform: scale(1.05); box-shadow: 0 0 40px #00b4d8; }

        .halaman { display: none; animation: fadeIn 0.8s; }
        .aktif { display: block; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- KONTAINER --- */
        .container-box {
            max-width: 500px; margin: 20px auto; padding: 30px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px; backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 180, 216, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* --- KARTU SKILL --- */
        .skill-container {
            display: flex; justify-content: center;
            gap: 10px; margin: 15px 0; flex-wrap: wrap;
        }
        .skill-card {
            background: rgba(0, 180, 216, 0.1);
            border: 1px solid #00b4d8; padding: 6px 12px;
            border-radius: 50px; font-size: 0.75rem;
            font-weight: bold; color: #00b4d8; transition: 0.3s;
        }
        .skill-card:hover {
            background: #00b4d8; color: white;
            box-shadow: 0 0 15px #00b4d8; transform: translateY(-3px);
        }

        /* --- INPUT & TOMBOL --- */
        input, textarea { 
            padding: 12px; border-radius: 8px; border: 1px solid #00b4d8; 
            width: 280px; max-width: 85%; outline: none; margin-bottom: 15px;
            background: rgba(10, 25, 47, 0.7); color: white;
        }

        button { 
            padding: 12px 25px; border-radius: 8px; font-weight: bold; 
            margin: 5px; transition: 0.3s; border: none;
        }
        .btn-utama { background-color: #00b4d8; color: white; box-shadow: 0 0 15px rgba(0,180,216,0.4); }
        .btn-utama:hover { transform: translateY(-2px); box-shadow: 0 0 25px #00b4d8; }

        /* TIKTOK STYLE */
        .tiktok-link {
            display: inline-block; color: #fff; text-decoration: none;
            font-size: 1.1rem; font-weight: bold; padding: 10px 20px;
            border: 2px solid #ff0050; border-radius: 50px;
            transition: 0.4s; background: rgba(255, 0, 80, 0.1);
            margin-top: 10px;
        }
        .tiktok-link:hover { background: #ff0050; box-shadow: 0 0 20px #ff0050; transform: scale(1.05); }

    </style>
</head>
<body>

    <div id="cursor-custom"></div>

    <nav>
        <span class="link-nav" onclick="bukaHalaman('beranda')">Beranda</span> | 
        <span class="link-nav" onclick="bukaHalaman('tentang')">Tentang Saya</span>
    </nav>

    <div id="beranda" class="halaman aktif">
        <h1>Selamat Datang</h1>
        <img src="https://i.ibb.co.com/dwH71J3P/1608c81dee05438598d15def6d6fe835-tplv-photomode-image.jpg" alt="Foto Hamzz">
        <p id="teksSapaan" style="font-size: 1.3rem; min-height: 1.5em;"></p>
        
        <div style="margin-top: 20px;">
            <input type="text" id="inputNama" placeholder="Ketik nama kamu...">
            <br>
            <button id="tombolSapa" class="btn-utama">KIRIM SAPAAN</button>
        </div>
    </div>

    <div id="tentang" class="halaman">
        <div class="container-box">
            <h2 style="color: #00b4d8;">Tentang Saya</h2>
            <img src="https://i.ibb.co.com/mrCDmzrk/IMG-20260510-WA0058.jpg" style="width: 80px; height: 80px;" alt="Profil">
            <p>Halo! Saya <strong>Hamzz</strong>. Saya sedang mendalami dunia desain dan web development.</p>
            
            <p style="font-size: 0.8rem; opacity: 0.8; margin-bottom: 5px;">Keahlian saya:</p>
            <div class="skill-container">
                <div class="skill-card">HTML5</div>
                <div class="skill-card">CSS3</div>
                <div class="skill-card">JS</div>
                <div class="skill-card">CapCut</div>
                <div class="skill-card">Design</div>
            </div>

            <div style="margin: 20px 0;">
                <a href="https://vm.tiktok.com/ZS9FbTasfxXMR-QK3iK/" target="_blank" class="tiktok-link">
                   🎵 Ikuti di TikTok
                </a>
            </div>

            <hr style="border: 0; border-top: 1px solid rgba(0, 180, 216, 0.2); margin: 25px 0;">
            
            <h3>Hubungi Saya</h3>
            <form action="https://formspree.io/f/xaqvllek" method="POST">
                <input type="text" name="Nama" placeholder="Nama Anda" required> <br>
                <input type="email" name="Email" placeholder="Email Anda" required> <br>
                <textarea name="Pesan" placeholder="Pesan untuk Hamzz..." rows="3" required></textarea> <br>
                <button type="submit" class="btn-utama">KIRIM PESAN</button>
            </form>
        </div>
    </div>

    <script>
        // LOGIKA KURSOR
        const cursor = document.getElementById('cursor-custom');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // EFEK KETIKAN
        const teksElemen = document.getElementById('teksSapaan');
        const kata = "Saya sedang belajar coding dari nol!";
        let i = 0;
        function ketik() {
            if (i < kata.length) {
                teksElemen.innerHTML += kata.charAt(i);
                i++;
                setTimeout(ketik, 80);
            }
        }
        window.onload = ketik;

        // NAVIGASI SPA
        function bukaHalaman(idHalaman) {
            const semuaHalaman = document.querySelectorAll('.halaman');
            semuaHalaman.forEach(hal => hal.classList.remove('aktif'));
            document.getElementById(idHalaman).classList.add('aktif');
        }

        // INTERAKSI SAPAAN
        const tombolSapa = document.getElementById('tombolSapa');
        const inputNama = document.getElementById('inputNama');
        tombolSapa.onclick = function() {
            const nama = inputNama.value;
            if (nama !== "") {
                teksElemen.innerHTML = "Halo " + nama + ", selamat datang di dunia coding!";
                teksElemen.style.color = "#00b4d8";
                inputNama.value = "";
            }
        };

        // ENTER KEY
        inputNama.addEventListener("keypress", (e) => {
            if (e.key === "Enter") tombolSapa.click();
        });
    </script>
</body>
</html>
